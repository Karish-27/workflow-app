services:
  - type: web
    name: workflow-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false        # Set this in the Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure value
      - key: FRONTEND_URL
        sync: false        # Set to your Vercel URL after deploying frontend
